<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Clash</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <h1>Rock Paper Scissor</h1>
    <div class="game-container">
        <img src="stone.png" alt="rock">
        <img src="paper.jpeg" alt="paper">
        <img src="sciss.jpeg" alt="scissors">
        <div class="choices">
            <button onclick="playGame('rock')"> Rock</button>
            <button onclick="playGame('paper')">Paper</button>
            <button onclick="playGame('scissors')">Scissors</button>
        </div>

        <h2 id="result">Make your move!</h2>
        <p id="score">You: 0 | Computer: 0</p>
        <img id="resultGif" src="win.gif" class="hidden">
    </div>

    <script src="RPS.js"></script>
</body>

</html>
